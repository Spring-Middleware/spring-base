server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/registry}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

middleware:
  log:
    apiKey: ${LOG_API_KEY}
    request:
      enabled: ${LOG_REQUEST_ENABLED:true}
    response:
      enabled: ${LOG_RESPONSE_ENABLED:true}
    responseTime:
      enabled: ${LOG_RESPONSE_TIME_ENABLED:false}
    exclude:
      urlPatterns:
        - /api-docs/**
        - /swagger-ui.html
        - /swagger-ui/**
        - /_alive

  jms:
    enabled: true
    base-packages: io.github.spring.middleware.registry.jms
    profile: ${JMS_PROFILE:LOCAL}
    host: ${JMS_HOST:amqp://rabbitmq:5672}
    user: ${JMS_USER:admin}
    password: ${JMS_PASSWORD}
    max-pool-size: ${JMS_MAX_POOL_SIZE:10}
    min-idle: ${JMS_MIN_IDLE:5}
    max-idle: ${JMS_MAX_IDLE:10}
    rabbitmq:
      base-url: ${JMS_RABBITMQ_BASE_URL:http://rabbitmq:15672}
      registry:
        scanner:
          check-interval: ${JMS_RABBITMQ_REGISTRY_SCANNER_CHECK_INTERVAL_MS:10000}
          enabled: ${JMS_RABBITMQ_REGISTRY_SCANNER_ENABLED:true}


  client:
    # When running in Docker compose the registry service is reachable at hostname `registry` on port 8080
    registryEndpoint: ${REGISTRY_ENDPOINT:http://localhost:8080/registry}

    configurationTask:
      retryDelaySeconds: ${PROXY_CLIENT_RETRY_DELAY_SECONDS:10}
      retryMinBackoffSeconds: ${PROXY_CLIENT_RETRY_MIN_BACKOFF_SECONDS:2}
      retryMaxBackoffSeconds: ${PROXY_CLIENT_RETRY_MAX_BACKOFF_SECONDS:30}
      threadPoolSize: ${PROXY_CLIENT_THREAD_POOL_SIZE:5}


  resourceRegister:
    clusterName: ${RESOURCE_CLUSTER_NAME:registry}

  publicServer:
    # In Docker the public hostname will be the service name `registry` (or set via env)
    host: ${PUBLIC_SERVER_HOST:localhost}
    port: ${PUBLIC_SERVER_PORT:8070}

  graphql:
    enabled: ${GRAPHQL_ENABLED:false}

  registryConsistencyScheduler:
    enabled: ${REGISTRY_CONSISTENCY_SCHEDULER_ENABLED:false}

  registry-topology-reconciler:
    enabled: ${REGISTRY_TOPOLOGY_RECONCILER_ENABLED:false}
    cron: ${REGISTRY_TOPOLOGY_RECONCILER_CRON:*/30 * * * * *}
    timeoutMillis: ${REGISTRY_TOPOLOGY_RECONCILER_TIMEOUT_MILLIS:500}
    maxNoAvail: ${REGISTRY_TOPOLOGY_RECONCILER_MAX_NO_AVAIL:3}
    concurrency: ${REGISTRY_TOPOLOGY_RECONCILER_CONCURRENCY:20}
    healthPath: ${REGISTRY_TOPOLOGY_RECONCILER_HEALTH_PATH:/_alive}
    registerResourcePath: ${REGISTRY_TOPOLOGY_RECONCILER_REGISTER_RESOURCE_PATH:/resources/register}

redisson:
  # In Docker compose Redis service should be named `redis`
  address: ${REDIS_ADDRESS:redis://localhost:6379}
  database: ${REDIS_DATABASE:0}

logging:
  level:
    io.github.spring.middleware: ${LOG_LEVEL_PACKAGE:DEBUG}
    root: ${LOG_LEVEL_ROOT:ERROR}


server:
  port: ${SERVER_PORT:8084}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

spring:
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27018/ai_embeddings}
      uuid-representation: standard

logging:
  level:
    io.github.spring.middleware: ${LOG_LEVEL_PACKAGE:DEBUG}
    io.github.spring.middleware.scheduler: ERROR
    io.github.spring:.middleware.jms: ERROR
    org.springframework.security: ERROR
    org.springframework.security.web: ERROR
    root: ${LOG_LEVEL_ROOT:ERROR}

middleware:
  log:
    apiKey: ${LOG_API_KEY}
    request:
      enabled: ${LOG_REQUEST_ENABLED:true}
    response:
      enabled: ${LOG_RESPONSE_ENABLED:true}
    responseTime:
      enabled: ${LOG_RESPONSE_TIME_ENABLED:false}
    exclude:
      urlPatterns:
        - /api-docs/**
        - /swagger-ui.html
        - /swagger-ui/**
        - /_alive
        - /actuator/**
        - /graphql
  security:
    type: ${SECURITY_TYPE:NONE} # Options: NONE, BASIC_AUTH, JWT, OUAHT2, API_KEY

  ai:
    document:
      sources:
        documentation-middleware:
          enabled: true
          system-context: |
            You are the Spring Middleware documentation assistant.
            
            Answer only using the Spring Middleware documentation context.
            If the answer is not documented yet, say that it is not documented yet.
            
            Be concise, technical, and do not invent APIs.
          type: FILE_SYSTEM
          file-system:
            paths:
              - rag

        catalogs:
            enabled: true
            system-context: |
              You are a product catalog assistant.

              Answer ONLY using the provided product catalog context.
              If the answer is not explicitly present in the retrieved context, say exactly:
              "No está en los catálogos."

              Hard constraints:
              - Never use external knowledge.
              - Never invent product names.
              - Never add examples.
              - Never add partial-list disclaimers.
              - Never say "some products" unless the context explicitly says the list is partial.
              - Product names must be copied exactly from the context.
              - If no product names are present in the context, say: "No está en los catálogos."

              Style:
              - Be concise.
              - Prefer bullet points only when listing products from the context.
            type: CUSTOM
            chunker: catalogs-chunker
            provider-name: catalogs-provider

      indexing:
        enabled: true
        index-on-startup: true
        sources:
          documentation-middleware:
            vector-type: QDRANT
            chunker: middleware-markdown
            vector-namespace: documentation-middleware
            embedding-model: nomic-embed-text
            top-k: 5
            document-indexer-type: CHUNKER

          catalogs:
            vector-type: QDRANT
            chunker: catalogs-chunker
            vector-namespace: catalogs
            embedding-model: nomic-embed-text
            top-k: 5
            document-indexer-type: CHUNKER

    document-chunkers:
      middleware-default:
        type: DEFAULT
        default-config:
          chunk-size: ${AI_DOCUMENT_CHUNKER_CHUNK_SIZE:1200}
          overlap-size: ${AI_DOCUMENT_CHUNKER_OVERLAP_SIZE:200}

      middleware-markdown:
        type: MARKDOWN
        markdown:
          max-chars: 2000
          min-chars: 200
          split-by-headings: true
          max-heading-level: 6
          include-heading-in-chunk: true
          preserve-heading-path: true
          split-by-paragraphs: true
          split-by-sentences: false
          detect-code-blocks: true
          keep-code-blocks-intact: true
          trim: true
          remove-empty-lines: false
          include-line-numbers: false

      catalogs-chunker:
        type: JSON
        json:
          definitions:
            catalogs:
              rules-paths:
                - classpath:rules/catalogs.yml

    vector-store:
      in-memory:
        enabled: false
      mongo:
        enabled: true
      qdrant:
        enabled: true
        url: ${QDRANT_URL:http://localhost:6333}


    provider:
      ollama:
        models:
          - llama3.1:8b
          - nomic-embed-text
        baseUrl: ${OLLAMA_BASE_URL:http://localhost:11434}

  clients:
    enabled: false